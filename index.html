<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="MyIQScores" />

    <!-- Preconnect to font servers -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load fonts non-render-blocking with display=swap + media trick -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" /></noscript>

    <!-- Defer AdSense until after page load -->
    <script>
      // Load AdSense after page is interactive
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5051305701488211';
        s.async = true;
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      });
    </script>

    <!-- Defer Google Analytics until after page load -->
    <script>
      window.addEventListener('load', function() {
        var g = document.createElement('script');
        g.src = 'https://www.googletagmanager.com/gtag/js?id=G-57H1Q82XZ4';
        g.async = true;
        document.head.appendChild(g);
        g.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-57H1Q82XZ4');
        };
      });
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
